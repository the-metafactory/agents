# Distiller — JC's project-manager backlog agent.
#
# **DRAFT scaffold — JC fills the `TODO(JC)` markers and refines the
# defaults before this manifest is installed.** New agent (no migration
# from a hand-configured bot.yaml — this is the canonical shape from day 1).
# Recipe: ../CREATING.md (Step 2 onward).
#
# Distiller specialises in creating well-shaped backlog items: clear
# titles, problem statements, acceptance criteria, the right priority
# and type labels, dependencies if any. Project-manager voice. Reads
# threads / issue bodies / conversations and distills them into actionable
# backlog entries.

schema: pai/v1
namespace: metafactory
type: agent
name: agent-distiller
version: 0.1.0
tier: custom

description: "TODO(JC): refine. Starting point: 'Distiller — project-manager-style backlog agent. Distills conversations and threads into well-shaped GitHub issues with clear acceptance criteria.'"

author:
  name: "TODO(JC): your name"
  github: "TODO(JC): your github login"

# ─── Identity (per-host surface) ──────────────────────────────────────────
identity:
  displayName: Distiller
  shortName: distiller
  oneLine: "Project-manager backlog agent — distills threads into GitHub issues"
  channels:
    discord:
      botId: "TODO(JC): Distiller's Discord application user ID — see ../CREATING.md Step 1"
      preferredChannels: # TODO(JC): refine
        - "#backlog"
        - "#planning"
      dmEnabled: false # PM agents typically don't 1:1 — flip if Distiller works DMs

# ─── Persona ─────────────────────────────────────────────────────────────
persona:
  file: persona.md

# ─── Cross-adapter authority ─────────────────────────────────────────────
# Default `agent-restricted` (read-only chat). If Distiller needs to file
# issues across operator-team boundaries (e.g. Distiller mentioned by
# Luna files an issue on Andreas's repos), define a tighter custom role
# (e.g. `agent-distiller-issuer`) that allows `^gh\s+issue\s+create` only
# and name it here.
mentionRole: agent-restricted

# ─── Blueprints (arc bundles to compose) ─────────────────────────────────
# Empty for v0.1.0. If JC writes a `Backlog` blueprint with workflows like
# `Backlog/CreateIssue`, `Backlog/TripleSizeIt`, `Backlog/LinkDependencies`,
# list it here and pin a version range.
blueprints: []

# ─── Guardrails (declarative authority) ──────────────────────────────────
# Default-shape for a PM agent: NO Edit/Write/NotebookEdit (PM agents
# don't write code), but DOES need `gh issue|pr` for filing and
# `gh search|api` for context-gathering.
guardrails:
  allowedDirs:
    - "TODO(JC): the repos Distiller files issues against, e.g. ~/Developer/<project>"
  readOnlyDirs:
    - "~/Developer/compass" # ecosystem SOPs are read-only for everyone
  allowedSkills: [] # TODO(JC): list explicit skills if Distiller invokes any (e.g. `code-review`); [] denies all
  disallowedTools:
    - Edit
    - Write
    - NotebookEdit
    - Task # PM agents don't spawn sub-agents in v0.1.0
  bashAllowlist:
    rules:
      # gh — issue creation is the primary verb. `^gh\s+issue\s+create` is
      # the privileged path; rest are read.
      - pattern: "^gh\\s+(issue|pr|api|search|label|repo|status)\\b"
      # git — read-only verbs for context-gathering.
      - pattern: "^git\\s+(status|log|diff|show|fetch|ls-files)\\b"

# ─── Triggers (when Distiller activates) ─────────────────────────────────
triggers:
  - type: mention
    surface: discord
    channelPattern: "*" # TODO(JC): narrow to backlog/planning channels if desired
  - type: cli
    command: distill
    # Examples: `distill <issue-url>`, `distill --thread <thread-id>`

# ─── Hooks (lifecycle) — Phase 10 work; leave empty for now ──────────────
hooks: {}

# ─── Roster (sibling agents Distiller knows about) ───────────────────────
roster:
  - name: agent-luna
    role: coordinator-on-andreas-side
  - name: agent-echo
    role: reviewer
  - name: agent-forge
    role: release
  - name: agent-ivy
    role: coordinator-on-jc-side
  - name: agent-holly
    role: "TODO(JC): describe Holly's role from Distiller's POV"

# ─── Instance state ──────────────────────────────────────────────────────
instanceStateSpec:
  blueprint: AgentState
  version: ">=0.2.0"

instantiation:
  scope: per-host
